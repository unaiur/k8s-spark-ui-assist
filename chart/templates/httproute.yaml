{{- include "k8s-spark-ui-assist.validateGateway" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8s-spark-ui-assist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-spark-ui-assist.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "k8s-spark-ui-assist.httpGatewayName" . }}
      namespace: {{ include "k8s-spark-ui-assist.httpGatewayNamespace" . }}
      port: 443
  hostnames:
    - {{ include "k8s-spark-ui-assist.httpHostname" . | quote }}
  rules:
    # Catch-all rule for the dashboard UI.
    # The Go service prepends per-driver <prefix>/<selector> rules dynamically
    # (prefix is configured via httpDriverPathPrefix, default /proxy/);
    # this rule must remain last so it does not shadow driver routes.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "k8s-spark-ui-assist.fullname" . }}
          port: {{ .Values.service.port }}
