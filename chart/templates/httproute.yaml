{{- include "k8s-spark-ui-assist.validateGateway" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8s-spark-ui-assist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-spark-ui-assist.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "k8s-spark-ui-assist.httpGatewayName" . }}
      namespace: {{ include "k8s-spark-ui-assist.httpGatewayNamespace" . }}
      port: 443
  hostnames:
    - {{ include "k8s-spark-ui-assist.httpHostname" . | quote }}
  rules:
    # Route /proxy to the dashboard UI.
    # When SHS is not configured, "/" is also handled here so the dashboard is
    # reachable at the root path.
    - matches:
        - path:
            type: PathPrefix
            value: /proxy
      backendRefs:
        - name: {{ include "k8s-spark-ui-assist.fullname" . }}
          port: {{ .Values.service.port }}
    {{- if not .Values.shsService }}
    # When no SHS service is configured, also claim "/" so the dashboard is
    # reachable at the root path.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "k8s-spark-ui-assist.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
