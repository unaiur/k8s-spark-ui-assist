{{- include "k8s-spark-ui-assist.validateGateway" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8s-spark-ui-assist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-spark-ui-assist.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "k8s-spark-ui-assist.httpGatewayName" . }}
      namespace: {{ include "k8s-spark-ui-assist.httpGatewayNamespace" . }}
      port: 443
  hostnames:
    - {{ include "k8s-spark-ui-assist.httpHostname" . | quote }}
  rules:
    # Route /proxy to the dashboard UI.
    # The "/" path is handled by the runtime-managed root HTTPRoute
    # ("<selfService>-root-route"), created by the application on startup.
    - matches:
        - path:
            type: PathPrefix
            value: /proxy
      backendRefs:
        - name: {{ include "k8s-spark-ui-assist.fullname" . }}
          port: {{ .Values.service.port }}
