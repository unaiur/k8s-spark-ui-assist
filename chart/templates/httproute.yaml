{{- include "k8s-spark-ui-assist.validateGateway" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8s-spark-ui-assist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-spark-ui-assist.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpGatewayName }}
      namespace: {{ .Values.httpGatewayNamespace }}
      port: 443
  hostnames:
    - {{ .Values.httpHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "k8s-spark-ui-assist.fullname" . }}
          port: {{ .Values.service.port }}
