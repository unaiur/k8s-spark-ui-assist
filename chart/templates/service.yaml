apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-spark-ui-assist.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-spark-ui-assist.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "k8s-spark-ui-assist.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
